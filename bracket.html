<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WC 2026 — Bracket Picker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--bg:#000;--ink:#1a1a1a;--muted:#6b7280;--accent:#c8102e;
--card:#fff;--cardalt:#f7f9fc;--border:#e5e9f0;--gold:#f5b400;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);
background:linear-gradient(180deg,#000 0,#000 200px,#eef2f7 200px,#eef2f7 100%);min-height:100vh}
header{color:#fff;padding:24px 20px 16px;text-align:center}
header h1{margin:0 0 6px;font-size:26px;letter-spacing:.5px}
header .sub{opacity:.85;font-size:13px}
.toolbar{max-width:1280px;margin:14px auto;padding:14px 18px;background:#fff;border-radius:14px;
box-shadow:0 8px 24px rgba(0,0,0,.12);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.toolbar input[type=text],.toolbar input[type=email]{font:14px inherit;padding:9px 12px;border:1px solid #cfd6e0;border-radius:8px;background:#fff;color:var(--ink);min-width:200px;outline:none}
.toolbar input[type=text]:focus,.toolbar input[type=email]:focus{border-color:#000}
.toolbar .progress{font-weight:600;color:#334}
.toolbar .progress span{color:var(--accent)}
.toolbar button{appearance:none;border:0;background:#000;color:#fff;font:600 13px inherit;padding:9px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.toolbar button:hover{background:#222}
.toolbar button.ghost{background:#eef2f7;color:#000}
.toolbar button.ghost:hover{background:#dde3ec}
.toolbar button:disabled{background:#cfd6e0;color:#fff;cursor:not-allowed}
.toolbar .spacer{flex:1}
.toolbar .modeswitch{display:inline-flex;background:#eef2f7;border-radius:8px;padding:3px}
.toolbar .modeswitch button{background:transparent;color:#334;padding:6px 12px;border-radius:6px}
.toolbar .modeswitch button.active{background:#000;color:#fff}
.bracketwrap{max-width:1400px;margin:0 auto 30px;padding:0 12px}
/* Match card */
.match{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,.06);min-width:170px}
.match .label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
padding:4px 8px;background:#f1f4f9;border-bottom:1px solid var(--border)}
.team{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border:0;
background:#fff;width:100%;text-align:left;font:600 13px inherit;color:#334;transition:.12s;
border-bottom:1px solid var(--border)}
.team:last-child{border-bottom:0}
.team:hover{background:#eef6ff}
.team.win{background:#e6f4ea;color:#0f5132}
.team.win::after{content:"✔";margin-left:auto;color:#2e7d32;font-weight:700}
.team.loser{background:#fafafa;color:#9aa0a6;text-decoration:line-through}
.team.empty{color:var(--muted);font-style:italic;cursor:not-allowed}
.team:disabled{cursor:not-allowed}
.team img.flag{width:20px;height:auto;border:1px solid #d0d4da;border-radius:2px;flex-shrink:0}
/* Champion card */
.champion{background:linear-gradient(135deg,#f5b400,#c8102e);color:#fff;border:0;
text-align:center;padding:14px 10px;border-radius:10px;min-width:0;width:100%;font-weight:800;
box-shadow:0 6px 18px rgba(200,16,46,.3)}
.champion .label{background:transparent;color:rgba(255,255,255,.85);border:0}
.champion .name{font-size:16px;letter-spacing:.4px;display:flex;gap:8px;align-items:center;justify-content:center;margin-top:4px}
.champion img.flag{width:22px}
.champion.empty .name{opacity:.6;font-style:italic;font-weight:600}
/* Wide layout: 9 flexible columns that share the viewport width */
body.mode-wide .bracketwrap{display:flex;padding:14px 10px;gap:3px;align-items:stretch}
body.mode-wide .col{flex:1 1 0;min-width:0;display:flex;flex-direction:column;justify-content:space-around;padding:6px 2px;gap:6px}
body.mode-wide .col h3{margin:0 0 4px;font-size:10px;text-align:center;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
body.mode-wide .col.center{flex:1.15 1.15 0;justify-content:flex-start;gap:18px;padding-top:24px}
body.mode-wide .match{min-width:0}
body.mode-wide .team{padding:6px 8px;gap:6px;font-size:12px;line-height:1.25}
body.mode-wide .team span{word-break:break-word;min-width:0}
body.mode-wide .team img.flag{width:18px}
body.mode-wide .match .label{font-size:9px;padding:3px 6px}
body.mode-wide .compact-only{display:none}
@media (max-width:1100px){body.mode-wide .team{font-size:11px;padding:5px 6px}body.mode-wide .team img.flag{width:16px}}
@media (max-width:900px){body.mode-wide .bracketwrap{overflow-x:auto}body.mode-wide .col{flex:0 0 130px}}
/* Compact layout */
body.mode-compact .bracketwrap{display:none}
body.mode-compact .compactwrap{max-width:520px;margin:0 auto 30px;padding:0 14px}
body.mode-compact .compactwrap section{background:#fff;border-radius:12px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:14px 14px 18px;margin-bottom:18px}
body.mode-compact .compactwrap h2{margin:0 0 12px;font-size:14px;color:#334;text-transform:uppercase;letter-spacing:.7px;border-bottom:2px solid #000;padding-bottom:6px}
body.mode-compact .compactwrap .match{margin-bottom:8px}
body.mode-compact .compactwrap .champion{margin-top:6px}
body.mode-wide .compactwrap{display:none}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);
background:#000;color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;
opacity:0;transition:.3s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{text-align:center;padding:8px 20px 18px;color:var(--muted);font-size:12px}
@media (max-width:900px){body.mode-wide .bracketwrap{font-size:12px}body.mode-wide .col{min-width:160px}}
</style>
</head>
<body class="mode-wide">
<header>
  <h1>🏆 FIFA World Cup 2026 — Knockout Bracket</h1>
  <div class="sub">Click a team to mark them as the winner. Picks propagate to the next round automatically.</div>
</header>

<div class="toolbar">
  <input type="text" id="name" placeholder="Your name" autocomplete="name" maxlength="40">
  <input type="email" id="email" placeholder="Your email" autocomplete="email" maxlength="80">
  <div class="progress"><span id="prog">0</span>/32 picks</div>
  <div class="modeswitch" role="tablist">
    <button id="mWide" class="active" type="button">Wide</button>
    <button id="mCompact" type="button">Compact</button>
  </div>
  <div class="spacer"></div>
  <button id="btnCopy" disabled type="button">📋 Copy code</button>
  <button id="btnEmail" disabled type="button">✉ Email</button>
  <button id="btnDownload" disabled type="button">⬇ Download JSON</button>
  <button id="btnReset" class="ghost" type="button">Reset</button>
</div>

<div class="bracketwrap" id="bracket"></div>
<div class="compactwrap" id="compact"></div>

<div class="toast" id="toast"></div>
<footer>Forged in the fires of Mount Doom for the pursuit of Eternal Glory</footer>

<script>
const DATA = {"r32": [{"id": 1, "home": "Winner Group A", "away": "Runner-up Group B"}, {"id": 2, "home": "Winner Group C", "away": "Runner-up Group D"}, {"id": 3, "home": "Winner Group E", "away": "Runner-up Group F"}, {"id": 4, "home": "Winner Group G", "away": "Runner-up Group H"}, {"id": 5, "home": "Winner Group I", "away": "Runner-up Group J"}, {"id": 6, "home": "Winner Group K", "away": "Runner-up Group L"}, {"id": 7, "home": "Runner-up Group A", "away": "3rd-place 1"}, {"id": 8, "home": "Runner-up Group C", "away": "3rd-place 2"}, {"id": 9, "home": "Runner-up Group E", "away": "3rd-place 3"}, {"id": 10, "home": "Runner-up Group G", "away": "3rd-place 4"}, {"id": 11, "home": "Runner-up Group I", "away": "3rd-place 5"}, {"id": 12, "home": "Runner-up Group K", "away": "3rd-place 6"}, {"id": 13, "home": "Winner Group B", "away": "3rd-place 7"}, {"id": 14, "home": "Winner Group D", "away": "3rd-place 8"}, {"id": 15, "home": "Winner Group F", "away": "Runner-up Group H"}, {"id": 16, "home": "Winner Group J", "away": "Runner-up Group L"}], "teamPool": ["Winner Group A", "Runner-up Group B", "Winner Group C", "Runner-up Group D", "Winner Group E", "Runner-up Group F", "Winner Group G", "Runner-up Group H", "Winner Group I", "Runner-up Group J", "Winner Group K", "Runner-up Group L", "Runner-up Group A", "3rd-place 1", "Runner-up Group C", "3rd-place 2", "Runner-up Group E", "3rd-place 3", "Runner-up Group G", "3rd-place 4", "Runner-up Group I", "3rd-place 5", "Runner-up Group K", "3rd-place 6", "Winner Group B", "3rd-place 7", "Winner Group D", "3rd-place 8", "Winner Group F", "Runner-up Group H", "Winner Group J", "Runner-up Group L"], "flags": {}, "adminEmail": "your.email@odido.nl"};
const BRACKET = DATA.r32;
const POOL = DATA.teamPool;          // 32 teams in fixed order
const FLAGS = DATA.flags;
const ADMIN = DATA.adminEmail;
const STORAGE_KEY = "wc2026-bracket-state-v1";
const B32 = "0123456789abcdefghijklmnopqrstuv";  // 32-symbol alphabet

// ----- State -----
// ----- State -----
const DEFAULT_STATE = {
  name: "",
  email: "",
  r32: Array(16).fill(null),
  r16: Array(8).fill(null),
  qf:  Array(4).fill(null),
  sf:  Array(2).fill(null),
  final: null,
  third: null,
};
const state = Object.assign({}, DEFAULT_STATE, loadState() || {});

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || ""); }
  catch (e) { return null; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ----- Slot derivation (who plays whom in each round) -----
function r32Slots(i) { return [BRACKET[i].home, BRACKET[i].away]; }
function r16Slots(i) { return [state.r32[2*i], state.r32[2*i+1]]; }
function qfSlots(i)  { return [state.r16[2*i], state.r16[2*i+1]]; }
function sfSlots(i)  { return [state.qf[2*i],  state.qf[2*i+1]];  }
function finalSlots() { return [state.sf[0], state.sf[1]]; }
function thirdSlots() {
  // Losers of the two SFs (each SF is fed by sfSlots(i))
  const loser = (slots, winner) => {
    if (!slots[0] || !slots[1] || !winner) return null;
    return winner === slots[0] ? slots[1] : (winner === slots[1] ? slots[0] : null);
  };
  return [loser(sfSlots(0), state.sf[0]), loser(sfSlots(1), state.sf[1])];
}

// ----- Pick + propagation -----
function pickTeam(round, idx, team) {
  if (round === "r32") state.r32[idx] = team;
  else if (round === "r16") state.r16[idx] = team;
  else if (round === "qf") state.qf[idx] = team;
  else if (round === "sf") state.sf[idx] = team;
  else if (round === "final") state.final = team;
  else if (round === "third") state.third = team;
  validateDownstream();
  saveState();
  render();
}

// If a slot's team changed, any downstream pick for a team no longer in its
// slot is cleared.
function validateDownstream() {
  for (let k = 0; k < 8; k++) {
    const [a, b] = r16Slots(k);
    if (state.r16[k] && state.r16[k] !== a && state.r16[k] !== b) state.r16[k] = null;
  }
  for (let k = 0; k < 4; k++) {
    const [a, b] = qfSlots(k);
    if (state.qf[k] && state.qf[k] !== a && state.qf[k] !== b) state.qf[k] = null;
  }
  for (let k = 0; k < 2; k++) {
    const [a, b] = sfSlots(k);
    if (state.sf[k] && state.sf[k] !== a && state.sf[k] !== b) state.sf[k] = null;
  }
  const [fa, fb] = finalSlots();
  if (state.final && state.final !== fa && state.final !== fb) state.final = null;
  const [ta, tb] = thirdSlots();
  if (state.third && state.third !== ta && state.third !== tb) state.third = null;
}

// ----- Rendering -----
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}
function flagImg(team) {
  const u = FLAGS[team];
  return u ? '<img class="flag" src="' + u + '" alt="">' : '';
}
function makeMatch(round, idx, slots, picked, label) {
  const [a, b] = slots;
  const teamBtn = (team, slot) => {
    if (!team) return '<button class="team empty" disabled>—</button>';
    const cls = picked === team ? "win" : (picked && picked !== team ? "loser" : "");
    return `<button class="team ${cls}" data-round="${round}" data-idx="${idx}" data-team="${esc(team)}">${flagImg(team)}<span>${esc(team)}</span></button>`;
  };
  return `<div class="match"><div class="label">${label}</div>${teamBtn(a,0)}${teamBtn(b,1)}</div>`;
}
function makeChampion() {
  const t = state.final;
  const cls = t ? "" : "empty";
  return `<div class="champion ${cls}"><div class="label">Champion</div><div class="name">${flagImg(t)}${esc(t || "—")}</div></div>`;
}

function render() {
  // Wide layout: 9 columns
  const cols = [
    {title:"R32", matches: [0,1,2,3,4,5,6,7].map(i => makeMatch("r32", i, r32Slots(i), state.r32[i], "R32 #"+(i+1)))},
    {title:"R16", matches: [0,1,2,3].map(i => makeMatch("r16", i, r16Slots(i), state.r16[i], "R16 #"+(i+1)))},
    {title:"QF",  matches: [0,1].map(i => makeMatch("qf",  i, qfSlots(i),  state.qf[i],  "QF #"+(i+1)))},
    {title:"SF",  matches: [makeMatch("sf", 0, sfSlots(0), state.sf[0], "SF #1")]},
    {title:"Final", matches: [
        makeMatch("final", 0, finalSlots(), state.final, "Final"),
        makeChampion(),
        makeMatch("third", 0, thirdSlots(), state.third, "Third place"),
    ], center:true},
    {title:"SF",  matches: [makeMatch("sf", 1, sfSlots(1), state.sf[1], "SF #2")]},
    {title:"QF",  matches: [2,3].map(i => makeMatch("qf",  i, qfSlots(i),  state.qf[i],  "QF #"+(i+1)))},
    {title:"R16", matches: [4,5,6,7].map(i => makeMatch("r16", i, r16Slots(i), state.r16[i], "R16 #"+(i+1)))},
    {title:"R32", matches: [8,9,10,11,12,13,14,15].map(i => makeMatch("r32", i, r32Slots(i), state.r32[i], "R32 #"+(i+1)))},
  ];
  document.getElementById("bracket").innerHTML = cols.map(c => {
    const ms = Array.isArray(c.matches) ? c.matches.join("") : c.matches;
    return `<div class="col ${c.center?'center':''}"><h3>${c.title}</h3>${ms}</div>`;
  }).join("");

  // Compact layout: round-by-round vertical
  const sections = [
    {title:"Round of 32", body: [...Array(16).keys()].map(i => makeMatch("r32", i, r32Slots(i), state.r32[i], "Match "+(i+1))).join("")},
    {title:"Round of 16", body: [...Array(8).keys()].map(i => makeMatch("r16", i, r16Slots(i), state.r16[i], "Match "+(i+1))).join("")},
    {title:"Quarter-finals", body: [...Array(4).keys()].map(i => makeMatch("qf", i, qfSlots(i), state.qf[i], "Match "+(i+1))).join("")},
    {title:"Semi-finals", body: [...Array(2).keys()].map(i => makeMatch("sf", i, sfSlots(i), state.sf[i], "Match "+(i+1))).join("")},
    {title:"Third place play-off", body: makeMatch("third", 0, thirdSlots(), state.third, "Third place")},
    {title:"Final", body: makeMatch("final", 0, finalSlots(), state.final, "Final") + makeChampion()},
  ];
  document.getElementById("compact").innerHTML = sections.map(s =>
    `<section><h2>${s.title}</h2>${s.body}</section>`).join("");

  // Wire team buttons
  document.querySelectorAll(".team:not([disabled])").forEach(btn => {
    btn.addEventListener("click", () => {
      pickTeam(btn.dataset.round, +btn.dataset.idx, btn.dataset.team);
    });
  });

  // Progress + buttons
  const all = [...state.r32, ...state.r16, ...state.qf, ...state.sf, state.final, state.third];
  const done = all.filter(Boolean).length;
  document.getElementById("prog").textContent = done;
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((state.email || "").trim());
  const ready = done === 32 && (state.name || "").trim().length > 0 && emailOk;
  ["btnCopy","btnEmail","btnDownload"].forEach(id => document.getElementById(id).disabled = !ready);
}

// ----- Encoding/decoding -----
function teamIdx(name) { return POOL.indexOf(name); }
function encodePicks() {
  const seq = [
    ...state.r32, ...state.r16, ...state.qf, ...state.sf, state.final, state.third,
  ].map(teamIdx);
  if (seq.some(v => v < 0)) return null;
  return seq.map(v => B32[v]).join("");
}
function shareCode() {
  const code = encodePicks();
  if (!code) return null;
  const clean = s => s.trim().replace(/[|\n\r]/g, " ");
  return "WC26|" + clean(state.name) + "|" + clean(state.email) + "|" + code;
}
function payloadJson() {
  return JSON.stringify({
    schema: "wc2026-bracket-v1",
    name: state.name.trim(),
    email: state.email.trim(),
    picks: {
      r32: state.r32, r16: state.r16, qf: state.qf, sf: state.sf,
      final: state.final, third: state.third,
    },
  }, null, 2);
}

// ----- Toast -----
let toastT = 0;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove("show"), 2200);
}

// ----- Wire toolbar -----
const nameEl = document.getElementById("name");
nameEl.value = state.name;
nameEl.addEventListener("input", () => { state.name = nameEl.value; saveState(); render(); });
const emailEl = document.getElementById("email");
emailEl.value = state.email;
emailEl.addEventListener("input", () => { state.email = emailEl.value; saveState(); render(); });

document.getElementById("btnCopy").addEventListener("click", async () => {
  const code = shareCode(); if (!code) return;
  try { await navigator.clipboard.writeText(code); toast("Code copied — paste it to " + (ADMIN || "the pool admin")); }
  catch (e) { prompt("Copy this code and send it to the pool admin:", code); }
});
document.getElementById("btnEmail").addEventListener("click", () => {
  const code = shareCode(); if (!code) return;
  const subj = encodeURIComponent("WC2026 bracket — " + state.name.trim());
  const body = encodeURIComponent("My picks:\n\n" + code + "\n\n(Generated by the pool bracket page.)");
  window.location.href = "mailto:" + (ADMIN || "") + "?subject=" + subj + "&body=" + body;
});
document.getElementById("btnDownload").addEventListener("click", () => {
  const blob = new Blob([payloadJson()], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (state.name.trim() || "bracket") + ".json";
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
});
document.getElementById("btnReset").addEventListener("click", () => {
  if (!confirm("Clear all picks?")) return;
  state.r32.fill(null); state.r16.fill(null); state.qf.fill(null); state.sf.fill(null);
  state.final = null; state.third = null;
  saveState(); render();
});

// ----- Layout toggle -----
const mWide = document.getElementById("mWide");
const mCompact = document.getElementById("mCompact");
function setMode(m) {
  document.body.classList.toggle("mode-wide", m === "wide");
  document.body.classList.toggle("mode-compact", m === "compact");
  mWide.classList.toggle("active", m === "wide");
  mCompact.classList.toggle("active", m === "compact");
  localStorage.setItem("wc2026-mode", m);
}
mWide.addEventListener("click", () => setMode("wide"));
mCompact.addEventListener("click", () => setMode("compact"));
setMode(localStorage.getItem("wc2026-mode") || (window.innerWidth < 800 ? "compact" : "wide"));

render();
</script>
</body>
</html>
